databases:
  - name: stms-db
    plan: free
    databaseName: stms
    user: stms_user
    region: oregon
    ipAllowList: []

services:
  - type: web
    name: stms-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    numInstances: 1
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: stms-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: stms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: stms-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: stms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: stms-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: stms-db
          property: database
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: REDIS_HOST
        value: ""
      - key: REDIS_PORT
        value: "6379"
      - key: CORS_ORIGINS
        value: "https://nbk-ems-frontend.onrender.com"
